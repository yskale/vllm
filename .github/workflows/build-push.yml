name: Build and Push vLLM Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to RENCI Registry
        uses: docker/login-action@v3
        with:
          registry: containers.renci.org
          username: ${{ secrets.RENCI_REGISTRY_USER }}
          password: ${{ secrets.RENCI_REGISTRY_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: containers.renci.org/helxplatform/vllm:0.11.0-gemma4-v10
